name: Update README Stats

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/**"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GitHub Stats
        run: |
          curl -fsSL \
            "https://github-readme-stats-eight-theta.vercel.app/api?username=DevrisOfStar&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=6C63FF&icon_color=6C63FF&text_color=c9d1d9&include_all_commits=true&count_private=true" \
            -o assets/github-stats.svg
          curl -fsSL \
            "https://github-readme-stats-eight-theta.vercel.app/api/top-langs/?username=DevrisOfStar&layout=compact&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=6C63FF&text_color=c9d1d9&langs_count=8" \
            -o assets/top-langs.svg

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update README stats SVG"
          file_pattern: assets/*.svg
